name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (format + lint)
        run: bunx biome check src

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build (verify dist/ produces cleanly)
        # tsconfig has noEmit: true for editor/typecheck use. The actual
        # ship build overrides it so dist/ matches publishConfig.exports.
        # Running this in CI ensures the publishable artifact stays buildable.
        run: bunx tsc --noEmit false --outDir dist --declaration --declarationMap
