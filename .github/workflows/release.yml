name: Release

# Tag-triggered npm publish via OIDC trusted publishing (no NPM_TOKEN
# secret needed — short-lived token minted at workflow runtime).
#
# Prerequisites (one-time, see torii repo docs/Publishing-SDKs.md):
#   1. npm org `@torii-backend` exists.
#   2. npmjs.com → package → Trusted Publishers → add this repo/workflow
#      with environment `npm`.
#   3. GitHub repo → Settings → Environments → create `npm` environment
#      (optional: require manual approval to release).
#
# Tag convention: `v0.0.1` (matching package.json version exactly).

on:
  push:
    tags: ['v*']

permissions:
  contents: write     # for GH release creation
  id-token: write     # required for OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node (npm CLI for OIDC publish)
        # bun publish doesn't yet emit SLSA provenance attestations.
        # Use the npm CLI for `--provenance` support. Node 24 ships
        # with npm 11, required for the OIDC trusted-publishing handshake
        # (npm 10 on Node 22 falls back to anonymous auth → misleading 404).
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Assert tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test on tagged SHA
        run: bun test

      - name: Build dist/
        run: bunx tsc --noEmit false --outDir dist --declaration --declarationMap

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
